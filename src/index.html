<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDay</title>
</head>
<body>
    <div class="page-grid">
        <div class="sidebar">
            <div class="header"></div>
            <div class="content" id="sidebar-content"></div>
        </div>
        <div class="main">
            <div class="header" id="main-head">
                <h3 class="logo">ToDayList</h3>
                <nav>
                    <button class="tab-button">Projects</button>
                    <button class="tab-button">Tasks</button>
                    <button class="tab-button">Completed</button>
                </nav>
                <img class="profile-icon" src="./assets/images/profile-icon-woman-1.svg" alt="Profile picture illustration">
            </div>
            <div class="content" id="tab-content">
                <div class="page-title">
                    <h1 class="title">Today's Focus</h1>
                    <p class="subtitle">Focus on the high-impact tasks that will shift the course of your week</p>
                </div>
                <div class="today-sec">
                    <div class="today-info-bar">
                        <h5 id="tasks-subt">Priority Actions</h5>
                        <div class="task-counter">
                            <p class="counter-text">1 placeholder</p>
                        </div>
                    </div>
                </div>
                <div class="upcoming-sec">
                    <div class="upcoming-bar">
                        <h2 class="sec-2-title">Upcoming</h2>
                        <img src="./assets/images/margin-line.svg" alt="A decorative line break">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
